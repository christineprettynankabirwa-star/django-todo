<!DOCTYPE html>
<html>
<head>
    <title>Todo list</title>
</head>
<body>

<h1>My Tasks</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter task..." required>
    <button type="submit">Add Task</button>
</form>

<u1>
    {% for task in tasks %}
        <li>
            {{ task.title }}
        </li>
        {% empty %}
        <li>No tasks yet</li>
    {% endfor %}
</u1>

</body>
</html>
